name: Stale

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  # Gate on the GH App private key being provisioned (see auto-response.yml note).
  # Absent key => the stale sweep SKIPS cleanly (green) instead of failing red on
  # the daily schedule; resumes when the real org App is provisioned (#29).
  # NOTE (#29 / going-public): before the App lights this up, ensure internal
  # AIADLC work-items (gated issues/PRs, e.g. #2952) are exempt-labeled or moved
  # to a private tracker — else the sweep would auto-close blocked internal work.
  # PROBE the real capability (secret present AND App 4276364 installed), not
  # just secret-presence — checking presence alone was a false-green gate that
  # greenlit the stale sweep, which then 404'd in create-github-app-token because
  # the App was never installed. Gate on the probe step's OUTCOME so a missing key
  # OR missing installation makes the sweep SKIP cleanly (green + notice), never
  # fail red on the daily schedule and never falsely report ready (#29).
  gate:
    runs-on: ubuntu-latest
    outputs:
      app_ready: ${{ steps.probe.outputs.app_ready }}
    steps:
      - name: Probe GH App token (secret present AND app installed)
        id: token
        continue-on-error: true
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: "4276364"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - name: Resolve gate from probe outcome
        id: probe
        env:
          PROBE_OUTCOME: ${{ steps.token.outcome }}
        run: |
          if [ "$PROBE_OUTCOME" = "success" ]; then
            echo "app_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GH App 4276364 not usable (private-key secret missing OR app not installed on this repo) — skipping stale sweep. Resumes when the App is installed and the key is set (#29)."
          fi

  stale:
    needs: [gate]
    if: needs.gate.outputs.app_ready == 'true'
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: "4276364"
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - name: Mark stale issues and pull requests
        uses: actions/stale@v9
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          # #29 ruling 3: 90d before stale (up from 7/5) — a bridge that protects
          # UNTAGGED internal AIADLC work-items (exempt-labels only cover LABELED
          # ones) until ruling-4 separates internal coordination to a private
          # tracker. Follow-down: bring these back to a normal community value
          # once that separation lands.
          days-before-issue-stale: 90
          days-before-issue-close: 5
          days-before-pr-stale: 90
          days-before-pr-close: 3
          stale-issue-label: stale
          stale-pr-label: stale
          # #29 ruling 3: generous exempt set — canonical AIADLC triage labels +
          # blocked/gated/dependencies/internal/aiadlc so triaged/tagged internal
          # work is never auto-closed by the community stale sweep.
          exempt-issue-labels: enhancement,maintainer,pinned,security,no-stale,blocked,gated,dependencies,needs-triage,needs-info,ready-for-agent,ready-for-human,internal,aiadlc,wontfix
          exempt-pr-labels: maintainer,no-stale,blocked,gated,dependencies,internal,aiadlc
          operations-per-run: 10000
          exempt-all-assignees: true
          remove-stale-when-updated: true
          stale-issue-message: |
            This issue has been automatically marked as stale due to inactivity.
            Please add updates or it will be closed.
          stale-pr-message: |
            This pull request has been automatically marked as stale due to inactivity.
            Please add updates or it will be closed.
          close-issue-message: |
            Closing due to inactivity.
            If this is still an issue, please retry on the latest OpenClaw release and share updated details.
            If you are absolutely sure it still happens on the latest release, open a new issue with fresh repro steps.
          close-issue-reason: not_planned
          close-pr-message: |
            Closing due to inactivity.
            If you believe this PR should be revived, post in #pr-thunderdome-dangerzone on Discord to talk to a maintainer.
            That channel is the escape hatch for high-quality PRs that get auto-closed.
